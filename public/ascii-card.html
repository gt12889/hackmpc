<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ASCII Portrait Card</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#f2ebe0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
  .card { position:relative; width:360px; background:#fff; border-radius:16px; padding:24px;
          box-shadow:0 16px 40px rgba(12,32,48,.12); }
  .bracket { position:absolute; width:13px; height:13px; }
  .bracket.tl { top:10px; left:10px;  border-top:2px solid #8fb7c2; border-left:2px solid #8fb7c2; }
  .bracket.tr { top:10px; right:10px; border-top:2px solid #8fb7c2; border-right:2px solid #8fb7c2; }
  .bracket.bl { bottom:10px; left:10px;  border-bottom:2px solid #8fb7c2; border-left:2px solid #8fb7c2; }
  .bracket.br { bottom:10px; right:10px; border-bottom:2px solid #8fb7c2; border-right:2px solid #8fb7c2; }
  canvas.art { width:100%; aspect-ratio:4/3; display:block; border-radius:10px;
               background:linear-gradient(180deg,#ffffff 0%,#eef9fb 100%); }
  .title { margin:18px 2px 6px; font-size:19px; font-weight:800; color:#0c2030; letter-spacing:-.01em; }
  .desc  { margin:0 2px 16px; font-size:12px; line-height:1.55; color:#5b7785; }
  .btns  { display:flex; gap:8px; }
  .btn   { flex:1; border:none; border-radius:9px; background:#0c2030; color:#fff; font-size:12px;
           font-weight:600; padding:10px; cursor:pointer; transition:opacity .15s; }
  .btn:hover { opacity:.86; }
</style>
</head>
<body>
  <div class="card">
    <span class="bracket tl"></span><span class="bracket tr"></span>
    <span class="bracket bl"></span><span class="bracket br"></span>
    <canvas id="art" class="art"></canvas>
    <h2 class="title">Turn Analysis Into Authority.</h2>
    <p class="desc">A living ASCII portrait — characters rain downward through the shape in a smooth infinite loop.</p>
    <div class="btns">
      <button class="btn" id="copy">Copy Embed</button>
      <button class="btn" id="download">Download</button>
    </div>
  </div>
<script>
(function () {
  var CHARS = "01ABX+=#@29".split("");
  var COLS = 80, ROWS = 60, CELL = 6;                    // 480x360 buffer
  var canvas = document.getElementById("art");
  canvas.width = COLS * CELL; canvas.height = ROWS * CELL;
  var ctx = canvas.getContext("2d");
  ctx.font = "bold 7px ui-monospace, Menlo, monospace"; ctx.textBaseline = "top";

  var grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, "#007d93"); grad.addColorStop(0.55, "#0ba3b8"); grad.addColorStop(1, "#00c1d5");

  // ---- draw the word "BRIM" as the mask (no image -> cannot fail to load) ----
  var WORD = "BRIM";
  function buildActive() {
    var W = 320, H = 240;
    var s = document.createElement("canvas"); s.width = W; s.height = H;
    var o = s.getContext("2d");
    o.fillStyle = "#fff"; o.fillRect(0, 0, W, H);
    o.fillStyle = "#000";
    o.textAlign = "center"; o.textBaseline = "middle";
    var fontPx = 200;
    o.font = "900 " + fontPx + "px Arial, sans-serif";
    fontPx = fontPx * ((W * 0.9) / o.measureText(WORD).width);   // fit to ~90% width
    o.font = "900 " + fontPx + "px Arial, sans-serif";
    o.fillText(WORD, W / 2, H / 2 + 2);
    // downsample to the grid
    var g = document.createElement("canvas"); g.width = COLS; g.height = ROWS;
    var gc = g.getContext("2d"); gc.drawImage(s, 0, 0, COLS, ROWS);
    var d = gc.getImageData(0, 0, COLS, ROWS).data, a = [];
    for (var c = 0; c < COLS; c++) { a[c] = new Uint8Array(ROWS);
      for (var r = 0; r < ROWS; r++) { var i = (r * COLS + c) * 4;
        var b = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114; a[c][r] = b < 128 ? 1 : 0; } }
    return a;
  }
  var active = buildActive();

  var offset = new Float32Array(COLS), speed = new Float32Array(COLS), prevY = [], colChars = [];
  for (var c = 0; c < COLS; c++) {
    offset[c] = Math.random() * ROWS * CELL; speed[c] = 0.3 + Math.random() * 0.6;
    prevY[c] = new Float32Array(ROWS); colChars[c] = [];
    for (var r = 0; r < ROWS; r++) colChars[c][r] = CHARS[(Math.random() * CHARS.length) | 0];
  }

  var total = ROWS * CELL;
  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = grad;
    for (var c = 0; c < COLS; c++) {
      offset[c] = (offset[c] + speed[c]) % total;
      for (var k = 0; k < ROWS; k++) {
        var y = (k * CELL + offset[c]) % total;
        if (y < prevY[c][k]) colChars[c][k] = CHARS[(Math.random() * CHARS.length) | 0];
        prevY[c][k] = y;
        var gr = (y / CELL) | 0;
        if (!active[c][gr]) continue;
        ctx.fillText(colChars[c][k], c * CELL, y);
      }
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  function flash(id, t) { var b = document.getElementById(id), o = b.textContent; b.textContent = t; setTimeout(function () { b.textContent = o; }, 1200); }
  function src() { return "<!DOCTYPE html>" + String.fromCharCode(10) + document.documentElement.outerHTML; }
  document.getElementById("copy").onclick = function () { navigator.clipboard.writeText(src()).then(function(){ flash("copy","Copied!"); }, function(){ flash("copy","Copy failed"); }); };
  document.getElementById("download").onclick = function () { var b = new Blob([src()], { type: "text/html" }); var a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "ascii-card.html"; a.click(); URL.revokeObjectURL(a.href); };
})();
</script>
</body>
</html>
