<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ASCII Portrait Card</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#eceef1; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
  .card { position:relative; width:320px; background:#fff; border-radius:14px; padding:22px;
          box-shadow:0 12px 34px rgba(15,23,42,.10); }
  .bracket { position:absolute; width:12px; height:12px; }
  .bracket.tl { top:9px;  left:9px;  border-top:2px solid #9ca3af; border-left:2px solid #9ca3af; }
  .bracket.tr { top:9px;  right:9px; border-top:2px solid #9ca3af; border-right:2px solid #9ca3af; }
  .bracket.bl { bottom:9px; left:9px;  border-bottom:2px solid #9ca3af; border-left:2px solid #9ca3af; }
  .bracket.br { bottom:9px; right:9px; border-bottom:2px solid #9ca3af; border-right:2px solid #9ca3af; }
  canvas.art { width:100%; aspect-ratio:4/3; display:block; background:#fff; border-radius:6px; }
  .title { margin:16px 2px 6px; font-size:18px; font-weight:800; color:#111827; letter-spacing:-.01em; }
  .desc  { margin:0 2px 14px; font-size:12px; line-height:1.55; color:#6b7280; }
  .btns  { display:flex; gap:8px; }
  .btn   { flex:1; border:none; border-radius:8px; background:#111827; color:#fff; font-size:12px;
           font-weight:600; padding:9px 10px; cursor:pointer; transition:opacity .15s; }
  .btn:hover { opacity:.86; }
</style>
</head>

<script>
(function () {
  // ---- config ----
  var CHARS = "01ABX+=#@29".split("");
  var COLS = 80, ROWS = 60, CELL = 6;            // 80x60 grid, 6px cells -> 480x360 buffer
  var DARK = "#1a1a4e";

  var canvas = document.getElementById("art");
  canvas.width = COLS * CELL; canvas.height = ROWS * CELL;
  var ctx = canvas.getContext("2d");
  ctx.font = "6px monospace"; ctx.textBaseline = "top";

  // ---- per-column state ----
  var offset = new Float32Array(COLS);   // pixels
  var speed  = new Float32Array(COLS);   // 0.3..0.9 px/frame
  var prevY  = [], colChars = [];
  for (var c = 0; c < COLS; c++) {
    offset[c] = Math.random() * ROWS * CELL;
    speed[c]  = 0.3 + Math.random() * 0.6;
    prevY[c]  = new Float32Array(ROWS);
    colChars[c] = [];
    for (var r = 0; r < ROWS; r++) colChars[c][r] = CHARS[(Math.random() * CHARS.length) | 0];
  }

  // ---- sample portrait brightness into the 80x60 active grid (dark = active) ----
  var active = null;
  function sample(img) {
    var off = document.createElement("canvas"); off.width = COLS; off.height = ROWS;
    var o = off.getContext("2d");
    o.drawImage(img, 0, 0, COLS, ROWS);
    var d = o.getImageData(0, 0, COLS, ROWS).data;
    active = [];
    for (var c = 0; c < COLS; c++) {
      active[c] = new Uint8Array(ROWS);
      for (var r = 0; r < ROWS; r++) {
        var i = (r * COLS + c) * 4;
        var b = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;
        active[c][r] = b < 128 ? 1 : 0;        // dark pixel = active
      }
    }
  }

  // ---- render loop ----
  var total = ROWS * CELL;
  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = DARK;
    if (active) {
      for (var c = 0; c < COLS; c++) {
        offset[c] = (offset[c] + speed[c]) % total;     // wrap with modulo -> seamless loop
        for (var k = 0; k < ROWS; k++) {
          var y = (k * CELL + offset[c]) % total;
          if (y < prevY[c][k]) colChars[c][k] = CHARS[(Math.random() * CHARS.length) | 0]; // fresh char on wrap
          prevY[c][k] = y;
          var gr = (y / CELL) | 0;                       // grid row this char occupies now
          if (!active[c][gr]) continue;                  // only render inside the portrait shape
          ctx.fillText(colChars[c][k], c * CELL, y);
        }
      }
    }
    requestAnimationFrame(frame);
  }

  var img = document.getElementById("src");
  if (img.complete && img.naturalWidth) sample(img); else img.onload = function () { sample(img); };
  requestAnimationFrame(frame);

  // ---- buttons ----
  function flash(id, t) { var b = document.getElementById(id), o = b.textContent; b.textContent = t; setTimeout(function () { b.textContent = o; }, 1200); }
  function sourceHTML() { return "<!DOCTYPE html>
" + document.documentElement.outerHTML; }
  document.getElementById("copy").onclick = function () {
    navigator.clipboard.writeText(sourceHTML()).then(function () { flash("copy", "Copied!"); }, function () { flash("copy", "Copy failed"); });
  };
  document.getElementById("download").onclick = function () {
    var blob = new Blob([sourceHTML()], { type: "text/html" });
    var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "ascii-card.html"; a.click(); URL.revokeObjectURL(a.href);
  };
})();
</script>
