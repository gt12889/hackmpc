<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ASCII Portrait Card</title>
<style>
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background:#f2ebe0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
  .card { position:relative; width:320px; background:#fff; border-radius:16px; padding:22px;
          box-shadow:0 16px 40px rgba(12,32,48,.12); }
  .bracket { position:absolute; width:13px; height:13px; }
  .bracket.tl { top:9px;  left:9px;  border-top:2px solid #8fb7c2; border-left:2px solid #8fb7c2; }
  .bracket.tr { top:9px;  right:9px; border-top:2px solid #8fb7c2; border-right:2px solid #8fb7c2; }
  .bracket.bl { bottom:9px; left:9px;  border-bottom:2px solid #8fb7c2; border-left:2px solid #8fb7c2; }
  .bracket.br { bottom:9px; right:9px; border-bottom:2px solid #8fb7c2; border-right:2px solid #8fb7c2; }
  canvas.art { width:100%; aspect-ratio:4/3; display:block; border-radius:8px;
               background:linear-gradient(180deg,#ffffff 0%,#f4fbfd 100%); }
  .title { margin:16px 2px 6px; font-size:18px; font-weight:800; color:#0c2030; letter-spacing:-.01em; }
  .desc  { margin:0 2px 14px; font-size:12px; line-height:1.55; color:#5b7785; }
  .btns  { display:flex; gap:8px; }
  .btn   { flex:1; border:none; border-radius:9px; background:#0c2030; color:#fff; font-size:12px;
           font-weight:600; padding:9px 10px; cursor:pointer; transition:opacity .15s; }
  .btn:hover { opacity:.86; }
</style>
</head>
<body>

    <span class="bracket tl"></span><span class="bracket tr"></span>
    <span class="bracket bl"></span><span class="bracket br"></span>
    <canvas id="art" class="art" width="480" height="360"></canvas>
    <h2 class="title">Turn Analysis Into Authority.</h2>
    <p class="desc">A living ASCII portrait — characters rain downward through the shape in a smooth infinite loop. Swap in any portrait to make it your own.</p>

      <button class="btn" id="download">Download</button>
    </div>

<script>
(function () {
  var CHARS = "01ABX+=#@29".split("");
  var COLS = 80, ROWS = 60, CELL = 6;
  var canvas = document.getElementById("art");
  canvas.width = COLS * CELL; canvas.height = ROWS * CELL;
  var ctx = canvas.getContext("2d");
  ctx.font = "6px ui-monospace, SFMono-Regular, Menlo, monospace"; ctx.textBaseline = "top";

  // Brim theme: vertical teal -> cyan gradient
  var grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, "#007d93"); grad.addColorStop(0.55, "#0ba3b8"); grad.addColorStop(1, "#00c1d5");

  var offset = new Float32Array(COLS), speed = new Float32Array(COLS), prevY = [], colChars = [];
  for (var c = 0; c < COLS; c++) {
    offset[c] = Math.random() * ROWS * CELL; speed[c] = 0.3 + Math.random() * 0.6;
    prevY[c] = new Float32Array(ROWS); colChars[c] = [];
    for (var r = 0; r < ROWS; r++) colChars[c][r] = CHARS[(Math.random() * CHARS.length) | 0];
  }

  var active = null;
  function sample(img) {
    var off = document.createElement("canvas"); off.width = COLS; off.height = ROWS;
    var o = off.getContext("2d"); o.drawImage(img, 0, 0, COLS, ROWS);
    var d = o.getImageData(0, 0, COLS, ROWS).data; active = [];
    for (var c = 0; c < COLS; c++) { active[c] = new Uint8Array(ROWS);
      for (var r = 0; r < ROWS; r++) { var i = (r * COLS + c) * 4;
        var b = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114; active[c][r] = b < 128 ? 1 : 0; } }
  }

  var total = ROWS * CELL;
  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = grad;
    if (active) {
      for (var c = 0; c < COLS; c++) {
        offset[c] = (offset[c] + speed[c]) % total;
        for (var k = 0; k < ROWS; k++) {
          var y = (k * CELL + offset[c]) % total;
          if (y < prevY[c][k]) colChars[c][k] = CHARS[(Math.random() * CHARS.length) | 0];
          prevY[c][k] = y;
          var gr = (y / CELL) | 0;
          if (!active[c][gr]) continue;
          ctx.fillText(colChars[c][k], c * CELL, y);
        }
      }
    }
    requestAnimationFrame(frame);
  }

  var img = document.getElementById("src");
  if (img.complete && img.naturalWidth) sample(img); else img.onload = function () { sample(img); };
  requestAnimationFrame(frame);

  function flash(id, t) { var b = document.getElementById(id), o = b.textContent; b.textContent = t; setTimeout(function () { b.textContent = o; }, 1200); }
  function src() { return "<!DOCTYPE html>
" + document.documentElement.outerHTML; }
  document.getElementById("copy").onclick = function () { navigator.clipboard.writeText(src()).then(function(){ flash("copy","Copied!"); }, function(){ flash("copy","Copy failed"); }); };
  document.getElementById("download").onclick = function () { var b = new Blob([src()], { type: "text/html" }); var a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "ascii-card.html"; a.click(); URL.revokeObjectURL(a.href); };
})();
</script>
